<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herbarium — Digitale Pflanzensammlung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- App -->
<div id="app" class="app">

  <header class="topbar">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" class="brand-mark">
        <path d="M17 2C10 8 6 15 6 21C6 26 10.5 30 17 30C23.5 30 28 26 28 21C28 15 24 8 17 2Z" stroke="currentColor" stroke-width="1.6"/>
        <path d="M17 4V28" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      <span>Herbarium</span>
    </div>

    <nav class="main-nav">
      <a href="#/pflanzen" data-nav="pflanzen">Pflanzen</a>
      <a href="#/rezepte" data-nav="rezepte">Rezepte</a>
    </nav>

    <div class="topbar-search">
      <input type="search" id="search-input" placeholder="Suchen…">
    </div>

    <div class="topbar-actions">
      <button id="new-btn" class="btn btn-primary btn-sm">+ Neu</button>
      <button id="export-btn" class="btn btn-ghost btn-sm" title="Alle Daten als JSON exportieren">Export</button>
    </div>
  </header>

  <main id="view" class="view"></main>

</div>

<div id="toast" class="toast" hidden></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
