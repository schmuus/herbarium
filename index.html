<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herbarium — Digitale Pflanzensammlung</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a4230">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Herbarium">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script>
  (function(){
    try{
      const saved = localStorage.getItem('herbarium-theme');
      if(saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #eae3cf;
    --paper-light: #f3ede0;
    --ink: #24301f;
    --ink-soft: #5b6152;
    --green: #3b5d42;
    --green-dark: #2a4230;
    --rose: #8a3b3b;
    --ochre: #a9791f;
    --slate: #556270;
    --plum: #8f5a76;
    --wood: #7a5236;
    --moss: #6b7a45;
    --line: rgba(36,48,31,0.18);
    --shadow: 0 8px 24px rgba(36,48,31,0.14), 0 2px 6px rgba(36,48,31,0.10);
  }
  [data-theme="dark"]{
    --paper:#1b201a;
    --paper-light:#242b21;
    --ink:#eae5d4;
    --ink-soft:#a7ab99;
    --green:#5c8a68;
    --green-dark:#8fbf9c;
    --rose:#c17777;
    --ochre:#d1a44e;
    --slate:#8b9baa;
    --plum:#c093ac;
    --wood:#b98a63;
    --moss:#9fb374;
    --line:rgba(234,229,212,0.16);
    --shadow: 0 10px 26px rgba(0,0,0,0.55), 0 3px 8px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(59,93,66,0.06), transparent 45%),
      radial-gradient(ellipse at 90% 10%, rgba(169,121,31,0.07), transparent 40%),
      var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    min-height:100vh;
    transition:background .2s ease, color .2s ease;
  }
  [data-theme="dark"] .card-photo{background:linear-gradient(160deg,#2b3226,#1f251c);}
  [data-theme="dark"] .overlay{background:rgba(0,0,0,0.7);}

  .app{max-width:1180px;margin:0 auto;padding:36px 24px 80px;}

  header.top{
    display:flex;justify-content:space-between;align-items:flex-end;gap:24px;
    border-bottom:2px solid var(--ink);
    padding-bottom:18px;margin-bottom:22px;flex-wrap:wrap;
  }
  .brand-eyebrow{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-soft);margin:0 0 4px;
  }
  h1.brand{
    font-family:'Fraunces',serif;font-weight:600;font-size:clamp(32px,5vw,48px);
    margin:0;line-height:1;color:var(--green-dark);letter-spacing:-0.01em;
  }
  .brand em{font-style:italic;font-weight:400;}
  .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

  input[type=text]{
    font-family:'Source Serif 4',serif;font-size:15px;
    background:var(--paper-light);border:1px solid var(--line);
    border-radius:3px;padding:10px 14px;color:var(--ink);min-width:220px;
  }
  input[type=text]:focus{outline:2px solid var(--green);outline-offset:1px;}

  button{
    font-family:'Space Mono',monospace;font-size:12.5px;letter-spacing:.04em;
    cursor:pointer;border-radius:3px;border:1px solid var(--ink);
    background:var(--ink);color:var(--paper-light);padding:11px 18px;
    text-transform:uppercase;transition:transform .12s ease, background .15s ease;
  }
  button:hover{background:var(--green-dark);}
  button:active{transform:translateY(1px);}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink);}
  button.ghost:hover{background:var(--ink);color:var(--paper-light);}
  button.danger{background:transparent;color:var(--rose);border:1px solid var(--rose);}
  button.danger:hover{background:var(--rose);color:var(--paper-light);}
  button:focus-visible, input:focus-visible, select:focus-visible, [contenteditable]:focus-visible{
    outline:2px solid var(--green); outline-offset:2px;
  }
  .icon-btn{
    background:transparent;border:1px solid var(--ink);color:var(--ink);
    width:40px;height:40px;padding:0;border-radius:50%;font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{background:var(--ink);color:var(--paper-light);}
  .icon-btn.small{width:26px;height:26px;font-size:12px;border-color:var(--line);color:var(--ink-soft);}
  .backup-controls{display:inline-flex;gap:4px;margin-left:auto;opacity:.7;}
  .backup-controls:hover{opacity:1;}

  .view-controls{
    display:flex;align-items:center;gap:20px;margin-bottom:18px;flex-wrap:wrap;
    font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft);
  }
  .view-controls label{display:flex;align-items:center;gap:7px;cursor:pointer;}
  .view-controls select{
    font-family:'Space Mono',monospace;font-size:12px;background:var(--paper-light);
    border:1px solid var(--line);border-radius:3px;padding:7px 10px;color:var(--ink);
  }

  .filters{display:flex;gap:8px;margin-bottom:26px;flex-wrap:wrap;}
  .chip-filter{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;padding:7px 12px;border-radius:20px;
    border:1px solid var(--line);background:var(--paper-light);cursor:pointer;color:var(--ink-soft);
  }
  .chip-filter.active{background:var(--ink);color:var(--paper-light);border-color:var(--ink);}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:22px;
  }
  .empty-state{
    grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--ink-soft);
    border:1px dashed var(--line);border-radius:4px;font-family:'Space Mono',monospace;font-size:13px;
  }
  .empty-state .big{display:block;font-family:'Fraunces',serif;font-style:italic;
    font-size:22px;color:var(--ink);margin-bottom:8px;}
  .spinner{
    width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--green);
    border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .family-group{margin-bottom:10px;}
  .family-group summary{
    font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--green-dark);
    cursor:pointer;padding:10px 4px;border-bottom:1px solid var(--line);margin-bottom:18px;
    list-style:none;
  }
  .family-group summary::-webkit-details-marker{display:none;}
  .family-group summary::before{content:'▸ ';}
  .family-group[open] summary::before{content:'▾ ';}
  .family-grid{margin-bottom:26px;}

  .card{
    background:var(--paper-light);border:1px solid var(--line);border-radius:4px;
    box-shadow:var(--shadow);cursor:pointer;overflow:hidden;position:relative;
    display:flex;flex-direction:column;transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(36,48,31,0.18);}
  .card-photo{
    height:150px;background:linear-gradient(160deg,#dcd6c2,#c9c3ab);
    display:flex;align-items:center;justify-content:center;position:relative;
    border-bottom:1px solid var(--line);overflow:hidden;
  }
  .card-photo img{width:100%;height:100%;object-fit:cover;}
  .leaf-watermark{width:56px;height:56px;opacity:.35;color:var(--green-dark);}
  .fav-star{
    position:absolute;top:8px;right:8px;background:rgba(30,26,18,0.55);border:none;
    color:#f0d977;width:28px;height:28px;border-radius:50%;font-size:15px;
    display:flex;align-items:center;justify-content:center;padding:0;line-height:1;
  }
  .fav-star:hover{background:rgba(30,26,18,0.8);}
  .fav-star.on{color:#f5c518;}
  .card-body{padding:14px 16px 12px;flex:1;display:flex;flex-direction:column;gap:4px;}
  .card-common{font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--ink);line-height:1.15;}
  .card-latin{font-style:italic;color:var(--ink-soft);font-size:13.5px;}
  .card-volksnamen{font-family:'Source Serif 4',serif;font-size:12px;color:var(--ink-soft);}
  .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .tag{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.04em;
    text-transform:uppercase;padding:3px 8px;border-radius:20px;color:#fff;
  }
  .tag.heilpflanze{background:var(--green);}
  .tag.giftig{background:var(--rose);}
  .tag.bedingt_giftig{background:var(--plum);}
  .tag.baum{background:var(--wood);}
  .tag.strauch{background:var(--moss);}
  .tag.speisepflanze{background:var(--ochre);}
  .tag.zierpflanze{background:var(--slate);}
  .tag.sonstige{background:var(--ink-soft);}
  .tag.custom{background:transparent;border:1px solid var(--line);color:var(--ink-soft);}

  .custom-tags-edit{padding:6px 32px 4px;}
  .custom-tags-edit label{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--ink-soft);display:block;margin-bottom:8px;}
  .custom-tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}

  .overlay{
    position:fixed;inset:0;background:rgba(24,30,20,0.55);backdrop-filter:blur(2px);
    display:none;align-items:flex-start;justify-content:center;padding:36px 16px;
    overflow-y:auto;z-index:50;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--paper-light);width:100%;max-width:820px;border-radius:6px;
    border:1px solid var(--line);box-shadow:0 30px 60px rgba(0,0,0,0.35);
    position:relative;
  }
  .sheet-header{
    display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
    padding:28px 32px 18px;border-bottom:2px solid var(--ink);
  }
  .sheet-title-block{flex:1;}
  .sheet-header-actions{display:flex;gap:8px;align-items:center;}
  .field-common{
    font-family:'Fraunces',serif;font-weight:600;font-size:30px;color:var(--green-dark);
    border:none;background:transparent;width:100%;padding:2px 0;outline:none;
  }
  .field-latin{
    font-family:'Source Serif 4',serif;font-style:italic;font-size:16px;color:var(--ink-soft);
    border:none;background:transparent;width:100%;padding:2px 0;outline:none;
  }
  .field-common:focus,.field-latin:focus{background:rgba(59,93,66,0.06);border-radius:3px;}
  .sheet-close{background:transparent;border:1px solid var(--ink);color:var(--ink);
    width:34px;height:34px;padding:0;border-radius:50%;font-size:16px;line-height:1;}
  .sheet-close:hover{background:var(--ink);color:var(--paper-light);}
  .sheet-fav{background:transparent;border:1px solid var(--ink);color:#c9a227;
    width:34px;height:34px;padding:0;border-radius:50%;font-size:16px;line-height:1;}
  .sheet-fav:hover{background:var(--ink);}

  .sheet-meta-row{
    display:flex;gap:20px;padding:14px 32px;border-bottom:1px dashed var(--line);
    flex-wrap:wrap;
  }
  .meta-item{display:flex;flex-direction:column;gap:3px;min-width:140px;flex:1;}
  .meta-item label{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--ink-soft);}
  .meta-item input{
    font-family:'Space Mono',monospace;font-size:13px;background:transparent;
    border:none;border-bottom:1px solid var(--line);padding:3px 0;color:var(--ink);
  }
  .meta-item input:focus{border-bottom:1px solid var(--green);}

  .photo-gallery{
    margin:20px 32px 0;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  }
  .photo-slot{
    position:relative;aspect-ratio:4/3;border-radius:4px;border:1px dashed var(--line);
    background:var(--paper);display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:pointer;
  }
  .photo-slot img{width:100%;height:100%;object-fit:cover;}
  .photo-slot .hint{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-soft);
    text-align:center;padding:0 8px;}
  .photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .photo-remove{
    position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;
    background:rgba(20,18,12,0.75);color:#fff;border:none;padding:0;font-size:12px;
    display:flex;align-items:center;justify-content:center;line-height:1;z-index:2;
  }
  .photo-remove:hover{background:var(--rose);}
  .photo-processing{
    position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;
    align-items:center;justify-content:center;font-family:'Space Mono',monospace;
    font-size:10px;color:#f3ede0;text-align:center;padding:0 8px;
  }

  .sections{padding:8px 32px 8px;display:grid;gap:4px;}
  .section{border-bottom:1px solid var(--line);padding:16px 0;}
  .section label{
    display:block;font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--green-dark);margin-bottom:8px;font-weight:700;
  }
  .section textarea{
    width:100%;font-family:'Source Serif 4',serif;font-size:15px;line-height:1.55;
    border:none;background:transparent;resize:none;overflow:hidden;min-height:32px;color:var(--ink);
    padding:4px 6px;border-radius:3px;
  }
  .section textarea:focus{background:rgba(59,93,66,0.06);}
  .section.warn label{color:var(--rose);}

  .harvest-section{padding-bottom:20px;}
  .harvest-calendar{width:100%;}
  .harvest-header,.harvest-row{display:flex;align-items:center;gap:6px;width:100%;}
  .harvest-header{margin-bottom:6px;}
  .harvest-row{margin-bottom:5px;}
  .harvest-label{
    width:58px;flex:0 0 auto;font-family:'Space Mono',monospace;font-size:10.5px;
    color:var(--ink-soft);letter-spacing:.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .harvest-row.accent .harvest-label{color:var(--ochre);font-weight:700;}
  .harvest-track{flex:1;min-width:0;display:grid;grid-template-columns:repeat(12,1fr);gap:0;height:22px;}
  .harvest-track.header{height:auto;}
  .harvest-month-label{
    font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-soft);text-align:center;
  }
  .harvest-cell{
    border:none;border-bottom:1px solid var(--line);background:var(--paper);cursor:pointer;
    padding:0;height:22px;min-width:0;
  }
  .harvest-cell.on{background:var(--green);border-bottom-color:var(--green);}
  .harvest-cell.on.seg-start{border-top-left-radius:11px;border-bottom-left-radius:11px;}
  .harvest-cell.on.seg-end{border-top-right-radius:11px;border-bottom-right-radius:11px;}
  .harvest-cell.on.accent{background:var(--ochre);border-bottom-color:var(--ochre);}
  .harvest-divider{
    border-top:1px dashed var(--line);margin:6px 0 10px 64px;
  }

  @media (max-width:640px){
    .harvest-label{width:42px;font-size:9px;}
    .harvest-divider{margin-left:48px;}
    .harvest-month-label{font-size:7.5px;}
  }

  .tags-edit{padding:6px 32px 4px;}
  .tags-edit label{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--ink-soft);display:block;margin-bottom:8px;}
  .tag-options{display:flex;gap:8px;flex-wrap:wrap;}
  .tag-opt{
    font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;
    padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:transparent;
    color:var(--ink-soft);cursor:pointer;
  }
  .tag-opt.on.heilpflanze{background:var(--green);color:#fff;border-color:var(--green);}
  .tag-opt.on.giftig{background:var(--rose);color:#fff;border-color:var(--rose);}
  .tag-opt.on.bedingt_giftig{background:var(--plum);color:#fff;border-color:var(--plum);}
  .tag-opt.on.baum{background:var(--wood);color:#fff;border-color:var(--wood);}
  .tag-opt.on.strauch{background:var(--moss);color:#fff;border-color:var(--moss);}
  .tag-opt.on.speisepflanze{background:var(--ochre);color:#fff;border-color:var(--ochre);}
  .tag-opt.on.zierpflanze{background:var(--slate);color:#fff;border-color:var(--slate);}
  .tag-opt.on.sonstige{background:var(--ink-soft);color:#fff;border-color:var(--ink-soft);}

  .confusable-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .confusable-pill{
    display:inline-flex;align-items:center;gap:6px;background:var(--paper);
    border:1px solid var(--line);border-radius:20px;padding:4px 4px 4px 12px;
  }
  .confusable-jump{
    background:transparent;border:none;padding:0;color:var(--ink);text-transform:none;
    letter-spacing:0;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;
  }
  .confusable-jump:hover{text-decoration:underline;color:var(--green-dark);}
  .confusable-remove{
    background:transparent;border:none;color:var(--ink-soft);width:18px;height:18px;
    border-radius:50%;padding:0;font-size:10px;
  }
  .confusable-remove:hover{background:var(--rose);color:#fff;}
  .confusable-add{
    font-family:'Space Mono',monospace;font-size:12px;background:var(--paper-light);
    border:1px solid var(--line);border-radius:3px;padding:8px 10px;color:var(--ink);width:100%;
  }

  .sheet-footer{
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 32px 28px;
  }
  .save-hint{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-soft);}

  @media (max-width:640px){
    .sheet-header,.sheet-meta-row,.photo-gallery,.sections,.tags-edit,.sheet-footer{
      padding-left:18px;padding-right:18px;
    }
    .card-photo{height:120px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div>
      <p class="brand-eyebrow">Sammlung &amp; Bestimmung</p>
      <h1 class="brand">Herbari<em>um</em></h1>
    </div>
    <div class="top-actions">
      <input type="text" id="search" placeholder="Suche nach Name, Familie, Tag …">
      <button id="themeToggle" class="icon-btn" type="button" title="Dunkelmodus umschalten">🌙</button>
      <button id="addBtn">+ Neue Pflanze</button>
    </div>
  </header>

  <div class="view-controls">
    <label><input type="checkbox" id="groupToggle"> Nach Familie gruppieren</label>
    <label>Sortierung:
      <select id="sortSelect">
        <option value="name">Name A–Z</option>
      </select>
    </label>
    <span class="backup-controls">
      <button id="exportBtn" class="icon-btn small" type="button" title="Sammlung als Backup (JSON) herunterladen">⬇</button>
      <button id="importBtn" class="icon-btn small" type="button" title="Backup (JSON) importieren">⬆</button>
      <input type="file" id="importInput" accept="application/json" hidden>
    </span>
  </div>

  <div class="filters" id="filters"></div>

  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import {
  getAuth, signInAnonymously, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

// ==== FIREBASE-KONFIGURATION ====
const firebaseConfig = {
  apiKey: "AIzaSyAZrE-mylzpDlqZr4OyMADDyG_yXjrLqaA",
  authDomain: "herbarium-9ee47.firebaseapp.com",
  projectId: "herbarium-9ee47",
  storageBucket: "herbarium-9ee47.firebasestorage.app",
  messagingSenderId: "998808054358",
  appId: "1:998808054358:web:5889a5f1f9e22eff97a9f7"
};
// =================================

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const plantsCol = collection(db, 'plants');

function ensureAuth(){
  return new Promise((resolve, reject)=>{
    onAuthStateChanged(auth, (user)=>{
      if(user) resolve(user);
      else signInAnonymously(auth).catch(reject);
    }, reject);
  });
}

let plants = [];
let activeFilter = null;
let showFavoritesOnly = false;
let groupByFamily = false;
let sortMode = 'name';
let currentId = null;

const TAGS = [
  {key:'heilpflanze', label:'Heilpflanze'},
  {key:'giftig', label:'Giftig'},
  {key:'bedingt_giftig', label:'Bedingt giftig'},
  {key:'speisepflanze', label:'Speisepflanze'},

async function loadPlants(){
  plants = [];
  document.getElementById('grid').innerHTML = `<div class="empty-state">
    <div class="spinner"></div>
    <span class="big">Sammlung wird geladen …</span>
  </div>`;
  try{
    await ensureAuth();
    const snap = await getDocs(plantsCol);
    plants = snap.docs.map(d => d.data());
  }catch(e){
    console.error('Firebase-Ladefehler:', e);
    alert('Verbindung zu Firebase fehlgeschlagen. Prüfe firebaseConfig und die Firestore-Regeln (siehe Konsole für Details).');
  }
  renderFilters();
  renderGrid();
}

function newPlant(){
  const id = 'p'+Date.now()+Math.random().toString(36).slice(2,7);
  return {
    id, commonName:'Neue Pflanze', latinName:'', family:'', volksnamen:'',
    tags:[], customTags:[], photos:[], thumb:'', favorite:false, confusables:[],
    bestimmung:'', pflanzenteile:'', inhaltsstoffe:'', heilwirkung:'', anwendung:'', rezepte:'',
    warnhinweise:'', notizen:'',
    bluetezeit:[], sammelKraut:[], sammelBluete:[], sammelSamen:[], sammelWurzel:[]
  };
}

async function savePlant(p){
  try{
    await ensureAuth();
    await setDoc(doc(db, 'plants', p.id), p);
  }catch(e){
    console.error('Firebase-Speicherfehler:', e);
    alert('Speichern in Firebase fehlgeschlagen: ' + e.message);
  }
}
async function deletePlantStorage(id){
  try{
    await ensureAuth();
    await deleteDoc(doc(db, 'plants', id));
  }catch(e){
    console.error('Firebase-Löschfehler:', e);
    alert('Löschen in Firebase fehlgeschlagen: ' + e.message);
  }
}

function sortPlants(list){
  const arr = [...list];
  arr.sort((a,b)=> (a.commonName||'').localeCompare(b.commonName||'', 'de'));
  return arr;
}

function renderFilters(){
  const el = document.getElementById('filters');
  const counts = {};
  plants.forEach(p => (p.tags||[]).forEach(t => counts[t]=(counts[t]||0)+1));
  const customCounts = {};
  plants.forEach(p => (p.customTags||[]).forEach(t => customCounts[t]=(customCounts[t]||0)+1));
  const favCount = plants.filter(p=>p.favorite).length;
  el.innerHTML = '';

  const allChip = document.createElement('button');
  allChip.className = 'chip-filter' + (activeFilter===null && !showFavoritesOnly ? ' active':'');
  allChip.textContent = `Alle (${plants.length})`;
  allChip.onclick = ()=>{activeFilter=null; showFavoritesOnly=false; renderFilters(); renderGrid();};
  el.appendChild(allChip);

  if(favCount>0){
    const favChip = document.createElement('button');
    favChip.className = 'chip-filter' + (showFavoritesOnly ? ' active':'');
    favChip.textContent = `★ Favoriten (${favCount})`;
    favChip.onclick = ()=>{ showFavoritesOnly = !showFavoritesOnly; activeFilter=null; renderFilters(); renderGrid(); };
    el.appendChild(favChip);
  }

  TAGS.forEach(t=>{
    if(!counts[t.key]) return;
    const chip = document.createElement('button');
    chip.className = 'chip-filter' + (activeFilter===t.key ? ' active':'');
    chip.textContent = `${t.label} (${counts[t.key]})`;
    chip.onclick = ()=>{activeFilter = activeFilter===t.key ? null : t.key; showFavoritesOnly=false; renderFilters(); renderGrid();};
    el.appendChild(chip);
  });

  Object.keys(customCounts).sort((a,b)=>a.localeCompare(b,'de')).forEach(tag=>{
    const filterKey = '#'+tag;
    const chip = document.createElement('button');
    chip.className = 'chip-filter' + (activeFilter===filterKey ? ' active':'');
    chip.textContent = `#${tag} (${customCounts[tag]})`;
    chip.onclick = ()=>{activeFilter = activeFilter===filterKey ? null : filterKey; showFavoritesOnly=false; renderFilters(); renderGrid();};
    el.appendChild(chip);
  });
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const q = document.getElementById('search').value.trim().toLowerCase();
  let list = plants;
  if(activeFilter){
    if(activeFilter.startsWith('#')){
      const tagName = activeFilter.slice(1);
      list = list.filter(p => (p.customTags||[]).includes(tagName));
    } else {
      list = list.filter(p => (p.tags||[]).includes(activeFilter));
    }
  }
  if(showFavoritesOnly) list = list.filter(p => p.favorite);
  if(q) list = list.filter(p =>
    (p.commonName||'').toLowerCase().includes(q) ||
    (p.latinName||'').toLowerCase().includes(q) ||
    (p.family||'').toLowerCase().includes(q) ||
    (p.volksnamen||'').toLowerCase().includes(q) ||
    (p.tags||[]).some(t=>t.includes(q)) ||
    (p.customTags||[]).some(t=>t.includes(q)) ||
    SECTION_DEFS.some(def => (p[def.key]||'').toLowerCase().includes(q))
  );
  list = sortPlants(list);

  grid.innerHTML = '';
  if(list.length===0){
    grid.innerHTML = `<div class="empty-state">
      <span class="big">Noch kein Beleg abgelegt.</span>
      Lege deine erste Pflanze an — Klick auf „+ Neue Pflanze".
    </div>`;
    return;
  }

  if(groupByFamily){
    const groups = {};
    list.forEach(p=>{
      const fam = (p.family && p.family.trim()) ? p.family.trim() : 'Ohne Familie';
      (groups[fam] = groups[fam] || []).push(p);
    });
    Object.keys(groups).sort((a,b)=>a.localeCompare(b,'de')).forEach(fam=>{
      const details = document.createElement('details');
      details.className = 'family-group';
      details.open = true;
      const summary = document.createElement('summary');
      summary.textContent = `${fam} (${groups[fam].length})`;
      details.appendChild(summary);
      const innerGrid = document.createElement('div');
      innerGrid.className = 'grid family-grid';
      groups[fam].forEach(p=> innerGrid.appendChild(buildCard(p)));
      details.appendChild(innerGrid);
      grid.appendChild(details);
    });
  } else {
    list.forEach(p=> grid.appendChild(buildCard(p)));
  }
}

function buildCard(p){
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = ()=> openSheet(p.id);
  card.innerHTML = `
    <div class="card-photo">
      ${p.thumb ? `<img src="${p.thumb}" alt="${escapeHtml(p.commonName)}">`
        : (p.photos && p.photos.length ? `<img src="${p.photos[0]}" alt="${escapeHtml(p.commonName)}">` : leafSVG)}
      <button type="button" class="fav-star ${p.favorite?'on':''}" title="Favorit">${p.favorite?'★':'☆'}</button>
    </div>
    <div class="card-body">
      <div class="card-common">${escapeHtml(p.commonName || 'Unbenannt')}</div>
      <div class="card-latin">${escapeHtml(p.latinName || '—')}</div>
      ${p.volksnamen ? `<div class="card-volksnamen">${escapeHtml(p.volksnamen)}</div>` : ''}
      <div class="card-tags">
        ${(p.tags||[]).map(t=>`<span class="tag ${t}">${TAGS.find(x=>x.key===t)?.label||t}</span>`).join('')}
        ${(p.customTags||[]).map(t=>`<span class="tag custom">#${escapeHtml(t)}</span>`).join('')}
      </div>
    </div>
  `;
  card.querySelector('.fav-star').onclick = async (e)=>{
    e.stopPropagation();
    p.favorite = !p.favorite;
    await savePlant(p);
    renderFilters();
    renderGrid();
  };
  return card;
}

function autoResizeTextarea(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function asMonthArray(values){
  return Array.isArray(values) ? values : [];
}

function computeSegClasses(values, i, accent){
  const arr = asMonthArray(values);
  if(!arr.includes(i)) return '';
  const prevOn = arr.includes(i-1);
  const nextOn = arr.includes(i+1);
  let cls = 'on';
  if(accent) cls += ' accent';
  if(!prevOn) cls += ' seg-start';
  if(!nextOn) cls += ' seg-end';
  return cls;
}

function harvestTrackHtml(key, values, accent){
  return MONTHS.map((_,i)=>`<button type="button" class="harvest-cell ${computeSegClasses(values,i,accent)}" data-field="${key}" data-month="${i}"></button>`).join('');
}

function harvestCalendarHtml(p){
  const sammelRows = SAMMEL_FIELDS.map(f=>`
    <div class="harvest-row">
      <span class="harvest-label">${f.shortLabel}</span>
      <div class="harvest-track" data-field="${f.key}" data-accent="0">${harvestTrackHtml(f.key, p[f.key], false)}</div>
    </div>
  `).join('');

  return `
    <div class="section harvest-section">
      <label>Erntekalender</label>
      <div class="harvest-calendar">
        <div class="harvest-header">
          <span class="harvest-label"></span>
          <div class="harvest-track header">
            ${MONTHS.map(m=>`<span class="harvest-month-label">${m}</span>`).join('')}
          </div>
        </div>
        <div class="harvest-row accent">
          <span class="harvest-label">Blütezeit</span>
          <div class="harvest-track" data-field="bluetezeit" data-accent="1">${harvestTrackHtml('bluetezeit', p.bluetezeit, true)}</div>
        </div>
        <div class="harvest-divider"></div>
        ${sammelRows}
      </div>
    </div>
  `;
}

function attachHarvestTrackListeners(track, key, p){
  const accent = track.dataset.accent === '1';
  track.querySelectorAll('.harvest-cell').forEach(cell=>{
    cell.onclick = async ()=>{
      const m = parseInt(cell.dataset.month, 10);
      p[key] = asMonthArray(p[key]);
      if(p[key].includes(m)) p[key] = p[key].filter(x=>x!==m);
      else p[key] = [...p[key], m];
      track.innerHTML = harvestTrackHtml(key, p[key], accent);
      attachHarvestTrackListeners(track, key, p);
      await savePlant(p);
    };
  });
}

function textSectionHtml(def, p){
  return `
    <div class="section ${def.warn?'warn':''}">
      <label>${def.label}</label>
      <textarea id="f-${def.key}" placeholder="…">${escapeHtml(p[def.key])}</textarea>
    </div>
  `;
}

function openSheet(id){
  currentId = id;
  const p = plants.find(x=>x.id===id);
  const sheet = document.getElementById('sheet');

  const bestimmungsBlock = [SECTION_DEFS[0], SECTION_DEFS[1], SECTION_DEFS[2]]
    .map(def => textSectionHtml(def, p)).join('');
  const wirkBlock = [SECTION_DEFS[3], SECTION_DEFS[4], SECTION_DEFS[5]]
    .map(def => textSectionHtml(def, p)).join('');
  const abschlussBlock = [SECTION_DEFS[6], SECTION_DEFS[7]]
    .map(def => textSectionHtml(def, p)).join('');
  const harvestBlock = harvestCalendarHtml(p);

  sheet.innerHTML = `
    <div class="sheet-header">
      <div class="sheet-title-block">
        <input class="field-common" id="f-commonName" value="${escapeHtml(p.commonName)}" placeholder="Deutscher Name">
        <input class="field-latin" id="f-latinName" value="${escapeHtml(p.latinName)}" placeholder="Botanischer Name (lat.)">
      </div>
      <div class="sheet-header-actions">
        <button type="button" class="sheet-fav" id="sheetFav" aria-label="Favorit">${p.favorite?'★':'☆'}</button>
        <button class="sheet-close" id="closeSheet" aria-label="Schließen">✕</button>
      </div>
    </div>

    <div class="sheet-meta-row">
      <div class="meta-item"><label>Familie</label><input id="f-family" value="${escapeHtml(p.family)}" placeholder="z. B. Lamiaceae"></div>
      <div class="meta-item"><label>Volkstümliche Namen</label><input id="f-volksnamen" value="${escapeHtml(p.volksnamen)}" placeholder="z. B. Bauernlorchel"></div>
    </div>

    <div class="photo-gallery" id="photoGallery"></div>

    <div class="tags-edit">
      <label>Kategorien</label>
      <div class="tag-options" id="tagOptions">
        ${TAGS.map(t=>`<button type="button" class="tag-opt ${t.key} ${(p.tags||[]).includes(t.key)?'on':''}" data-tag="${t.key}">${t.label}</button>`).join('')}
      </div>
    </div>

    <div class="custom-tags-edit">
      <label>Eigene Tags</label>
      <div class="custom-tag-list" id="customTagList"></div>
      <input type="text" id="customTagInput" class="confusable-add" placeholder="Eigenes Tag eingeben und Enter drücken …">
    </div>

    <div class="sections">
      ${bestimmungsBlock}
      ${harvestBlock}
      ${wirkBlock}
      <div class="section">
        <label>Verwechslungsgefahr</label>
        <div class="confusable-list" id="confusableList"></div>
        <select class="confusable-add" id="confusableAdd"></select>
      </div>
      ${abschlussBlock}
    </div>

    <div class="sheet-footer">
      <button class="danger" id="deletePlant">Beleg löschen</button>
      <span class="save-hint" id="saveHint">Änderungen werden automatisch gespeichert</span>
    </div>
  `;

  document.getElementById('closeSheet').onclick = closeSheetFn;
  document.getElementById('sheetFav').onclick = async ()=>{
    p.favorite = !p.favorite;
    document.getElementById('sheetFav').textContent = p.favorite ? '★' : '☆';
    await savePlant(p);
    renderFilters(); renderGrid();
  };
  document.getElementById('deletePlant').onclick = async ()=>{
    if(confirm(`„${p.commonName}" wirklich löschen?`)){
      await deletePlantStorage(p.id);
      plants = plants.filter(x=>x.id!==p.id);
      closeSheetFn();
      renderFilters(); renderGrid();
    }
  };

  const fields = ['commonName','latinName','family','volksnamen',
    ...SECTION_DEFS.map(s=>s.key)];
  fields.forEach(key=>{
    const el = document.getElementById('f-'+key);
    if(el.tagName === 'TEXTAREA'){
      autoResizeTextarea(el);
      el.addEventListener('input', ()=> autoResizeTextarea(el));
    }
    el.addEventListener('input', debounce(async ()=>{
      p[key] = el.value;
      await savePlant(p);
      renderCardsSilently();
    }, 400));
  });

  document.querySelectorAll('.tag-opt').forEach(btn=>{
    btn.onclick = async ()=>{
      const tag = btn.dataset.tag;
      p.tags = p.tags || [];
      if(p.tags.includes(tag)) p.tags = p.tags.filter(t=>t!==tag);
      else p.tags.push(tag);
      btn.classList.toggle('on');
      await savePlant(p);
      renderFilters(); renderGrid();
    };
  });

  document.querySelectorAll('.harvest-track[data-field]').forEach(track=>{
    attachHarvestTrackListeners(track, track.dataset.field, p);
  });

  renderPhotoGallery(p);
  renderConfusables(p);
  populateConfusableSelect(p);
  renderCustomTags(p);

  document.getElementById('customTagInput').addEventListener('keydown', async (e)=>{
    if(e.key !== 'Enter') return;
    e.preventDefault();
    const val = e.target.value.trim().toLowerCase();
    if(!val) return;
    p.customTags = p.customTags || [];
    if(!p.customTags.includes(val)){
      p.customTags.push(val);
      await savePlant(p);
      renderCustomTags(p);
      renderFilters(); renderGrid();
    }
    e.target.value = '';
  });

  document.getElementById('confusableAdd').addEventListener('change', async (e)=>{
    const cid = e.target.value;
    if(!cid) return;
    p.confusables = p.confusables || [];
    if(!p.confusables.includes(cid)) p.confusables.push(cid);
    await savePlant(p);
    renderConfusables(p);
    populateConfusableSelect(p);
    e.target.value = '';
  });

  document.getElementById('overlay').classList.add('open');
  document.querySelectorAll('#sheet textarea').forEach(autoResizeTextarea);
}

function renderCustomTags(p){
  const el = document.getElementById('customTagList');
  if(!el) return;
  p.customTags = p.customTags || [];
  el.innerHTML = '';
  p.customTags.forEach((tag, idx)=>{
    const pill = document.createElement('span');
    pill.className = 'confusable-pill';
    pill.innerHTML = `<span class="confusable-jump" style="cursor:default;">#${escapeHtml(tag)}</span><button type="button" class="confusable-remove">✕</button>`;
    pill.querySelector('.confusable-remove').onclick = async ()=>{
      p.customTags.splice(idx, 1);
      await savePlant(p);
      renderCustomTags(p);
      renderFilters(); renderGrid();
    };
    el.appendChild(pill);
  });
}

function renderConfusables(p){
  const el = document.getElementById('confusableList');
  if(!el) return;
  p.confusables = p.confusables || [];
  el.innerHTML = '';
  p.confusables.forEach(cid=>{
    const other = plants.find(x=>x.id===cid);
    if(!other) return;
    const pill = document.createElement('span');
    pill.className = 'confusable-pill';
    pill.innerHTML = `<button type="button" class="confusable-jump">${escapeHtml(other.commonName||'Unbenannt')}</button><button type="button" class="confusable-remove">✕</button>`;
    pill.querySelector('.confusable-jump').onclick = ()=> openSheet(other.id);
    pill.querySelector('.confusable-remove').onclick = async ()=>{
      p.confusables = p.confusables.filter(x=>x!==cid);
      await savePlant(p);
      renderConfusables(p);
      populateConfusableSelect(p);
    };
    el.appendChild(pill);
  });
}

function populateConfusableSelect(p){
  const sel = document.getElementById('confusableAdd');
  if(!sel) return;
  const options = plants.filter(x=> x.id!==p.id && !(p.confusables||[]).includes(x.id));
  sel.innerHTML = `<option value="">+ Pflanze verknüpfen …</option>` +
    options.map(x=>`<option value="${x.id}">${escapeHtml(x.commonName||'Unbenannt')}</option>`).join('');
}

function renderPhotoGallery(p){
  const gallery = document.getElementById('photoGallery');
  if(!gallery) return;
  p.photos = p.photos || [];
  gallery.innerHTML = '';

  p.photos.forEach((src, idx)=>{
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.innerHTML = `
      <img src="${src}" alt="Foto ${idx+1}">
      <button type="button" class="photo-remove" title="Foto entfernen">✕</button>
    `;
    slot.querySelector('.photo-remove').onclick = async (e)=>{
      e.stopPropagation();
      p.photos.splice(idx, 1);
      await updateThumb(p);
      await savePlant(p);
      renderPhotoGallery(p);
      renderGrid();
    };
    gallery.appendChild(slot);
  });

  if(p.photos.length < 3){
    const slot = document.createElement('label');
    slot.className = 'photo-slot';
    slot.innerHTML = `
      <span class="hint">+ Foto hinzufügen</span>
      <input type="file" accept="image/*">
    `;
    slot.querySelector('input').addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const processing = document.createElement('div');
      processing.className = 'photo-processing';
      processing.textContent = 'Wird komprimiert …';
      slot.appendChild(processing);
      try{
        const compressed = await compressImage(file, 300*1024);
        p.photos = p.photos || [];
        p.photos.push(compressed);
        await updateThumb(p);
        await savePlant(p);
        renderPhotoGallery(p);
        renderGrid();
      }catch(err){
        console.error('Bildkomprimierung fehlgeschlagen:', err);
        alert('Das Foto konnte nicht verarbeitet werden.');
        renderPhotoGallery(p);
      }
    });
    gallery.appendChild(slot);
  }
}

function imageFromSrc(src){
  return new Promise((resolve, reject)=>{
    const image = new Image();
    image.onload = ()=>resolve(image);
    image.onerror = reject;
    image.src = src;
  });
}

function renderCompressed(img, maxBytes, maxDim){
  let width = img.width, height = img.height;
  if(Math.max(width, height) > maxDim){
    const scale = maxDim / Math.max(width, height);
    width = Math.round(width * scale);
    height = Math.round(height * scale);
  }

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = width;
  canvas.height = height;
  ctx.drawImage(img, 0, 0, width, height);

  const estimateBytes = (dataUrlStr) => Math.round(dataUrlStr.length * 0.75);

  let quality = 0.85;
  let result = canvas.toDataURL('image/jpeg', quality);
  let attempts = 0;

  while(estimateBytes(result) > maxBytes && attempts < 10){
    if(quality > 0.4){
      quality -= 0.1;
    } else {
      width = Math.round(width * 0.85);
      height = Math.round(height * 0.85);
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      quality = 0.7;
    }
    result = canvas.toDataURL('image/jpeg', quality);
    attempts++;
  }
  return result;
}

async function compressImage(file, maxBytes = 300*1024, maxDim = 1600){
  const dataUrl = await new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const img = await imageFromSrc(dataUrl);
  return renderCompressed(img, maxBytes, maxDim);
}

async function makeThumbnail(srcDataUrl, maxBytes = 40*1024, maxDim = 360){
  const img = await imageFromSrc(srcDataUrl);
  return renderCompressed(img, maxBytes, maxDim);
}

async function updateThumb(p){
  if(p.photos && p.photos.length){
    try{ p.thumb = await makeThumbnail(p.photos[0]); }
    catch(e){ console.error('Thumbnail-Erstellung fehlgeschlagen:', e); }
  } else {
    p.thumb = '';
  }
}

function renderCardsSilently(){
  const scrollY = window.scrollY;
  renderFilters();
  renderGrid();
  window.scrollTo(0, scrollY);
}

function closeSheetFn(){
  document.getElementById('overlay').classList.remove('open');
  currentId = null;
}

function debounce(fn, ms){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id === 'overlay') closeSheetFn();
});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') closeSheetFn();
});

document.getElementById('addBtn').addEventListener('click', async ()=>{
  const p = newPlant();
  plants.unshift(p);
  await savePlant(p);
  renderFilters(); renderGrid();
  openSheet(p.id);
});

document.getElementById('search').addEventListener('input', renderGrid);

document.getElementById('groupToggle').addEventListener('change', (e)=>{
  groupByFamily = e.target.checked;
  renderGrid();
});
document.getElementById('sortSelect').addEventListener('change', (e)=>{
  sortMode = e.target.value;
  renderGrid();
});

const themeToggle = document.getElementById('themeToggle');
function applyThemeButton(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  themeToggle.textContent = isDark ? '☀️' : '🌙';
}
themeToggle.addEventListener('click', ()=>{
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if(isDark){
    document.documentElement.removeAttribute('data-theme');
    try{ localStorage.setItem('herbarium-theme','light'); }catch(e){}
  } else {
    document.documentElement.setAttribute('data-theme','dark');
    try{ localStorage.setItem('herbarium-theme','dark'); }catch(e){}
  }
  applyThemeButton();
});
applyThemeButton();

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const data = JSON.stringify(plants, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `herbarium-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', ()=>{
  document.getElementById('importInput').click();
});
document.getElementById('importInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!Array.isArray(data)) throw new Error('Ungültiges Format — erwartet wird eine Liste von Pflanzen.');
    if(!confirm(`${data.length} Pflanze(n) importieren? Einträge mit gleicher ID werden überschrieben.`)) return;
    for(const p of data){
      if(!p.id) p.id = 'p'+Date.now()+Math.random().toString(36).slice(2,7);
      await savePlant(p);
    }
    await loadPlants();
    alert(`${data.length} Pflanze(n) importiert.`);
  }catch(err){
    console.error('Import-Fehler:', err);
    alert('Import fehlgeschlagen: ' + err.message);
  }
  e.target.value = '';
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>{
      console.error('Service-Worker-Registrierung fehlgeschlagen:', err);
    });
  });
}

loadPlants();
</script>
</body>
</html>
